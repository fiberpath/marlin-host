[project]
name = "marlin-host"
version = "0.1.0"
description = "Host-side Python library for the Marlin firmware serial protocol."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Cameron K. Brooks" }]
keywords = ["marlin", "gcode", "serial", "3d-printing", "cnc", "host-protocol"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: System :: Hardware",
]
dependencies = []

[project.optional-dependencies]
# Real serial transport. Without it the library is pure (FakeTransport only).
serial = ["pyserial>=3.5"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["marlin_host"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.11",
    "pyright>=1.1",
    "pyserial>=3.5",
]

[tool.ruff]
line-length = 100
target-version = "py311"
# Generated by scripts/gen_constants.py — its style is the generator's concern.
extend-exclude = ["marlin_host/_constants.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "standard"
# Scope to our source — pyright does not honor .gitignore, and _reference/ /
# vendor/ hold third-party code that must not be type-checked.
include = ["marlin_host", "tests", "scripts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
